name: Weekly Social Post Ideas

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  generate:
    name: Generate social post ideas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/gen-social-post.ts
